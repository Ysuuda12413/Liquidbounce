name: Build & Release

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      lb_version: ${{ steps.version.outputs.LB_VERSION }}
      jar_name: ${{ steps.prep.outputs.jar_name }}
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "adopt"
          java-version: 8
          cache: "gradle"

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Read version from version.txt file
        id: version
        run: |
          LB_VERSION=$(cat version.txt | tr -d ' \n\r')
          echo "LB_VERSION=$LB_VERSION" >> $GITHUB_ENV
          echo "LB_VERSION=$LB_VERSION" >> $GITHUB_OUTPUT

      - name: Build
        run: ./gradlew build

      - name: Prepare artifact and get jar name
        id: prep
        run: |
          cd build/libs
          JAR=$(find . -regex '.*liquidbounce-b[0-9|.]*\.jar' | head -n1)
          if [ -z "$JAR" ]; then
            echo "No .jar file found! Build failed."
            exit 1
          fi
          MINECRAFT_VERSION='1.8.9'
          ARTIFACT_NAME="liquidbounce-${{ env.LB_VERSION }}-mc$MINECRAFT_VERSION.jar"
          mkdir -p ../../artifacts
          cp "$JAR" "../../artifacts/$ARTIFACT_NAME"
          echo "jar_name=$ARTIFACT_NAME" >> $GITHUB_OUTPUT

      - name: Upload artifact (download link)
        uses: actions/upload-artifact@v4
        with:
          name: LiquidBounce-JAR
          path: artifacts/*.jar

  release:
    needs: build
    runs-on: ubuntu-latest
    if: ${{ needs.build.outputs.lb_version != '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup gh CLI
        run: |
          sudo apt update
          sudo apt install gh -y

      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: LiquidBounce-JAR
          path: ./artifacts

      - name: List downloaded files
        run: ls -lh ./artifacts

      - name: Check JAR file exists
        run: |
          if [ ! -f ./artifacts/liquidbounce-${{ needs.build.outputs.lb_version }}-mc1.8.9.jar ]; then
            echo "JAR file not found!"
            exit 1
          fi

      - name: Setup git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch all tags
        run: git fetch --tags

      - name: Delete existing tag and release if they exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME=${{ needs.build.outputs.lb_version }}

          if git rev-parse "$TAG_NAME" >/dev/null 2>&1; then
            echo "Tag $TAG_NAME already exists. Deleting..."
            git tag -d "$TAG_NAME"
            git push origin :refs/tags/$TAG_NAME || true
          fi

          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo "Release $TAG_NAME already exists. Deleting..."
            gh release delete "$TAG_NAME" -y
          fi

      - name: Create new git tag
        run: |
          git tag ${{ needs.build.outputs.lb_version }}
          git push origin ${{ needs.build.outputs.lb_version }}

      - name: Create Release & Upload JAR
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.lb_version }}
          name: LiquidBounce ${{ needs.build.outputs.lb_version }}
          files: ./artifacts/liquidbounce-${{ needs.build.outputs.lb_version }}-mc1.8.9.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
